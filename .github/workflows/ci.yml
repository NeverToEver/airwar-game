name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: airwar_core

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev shellcheck

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Build Rust extension
        run: |
          python -m maturin build --release --manifest-path airwar_core/Cargo.toml --out "$RUNNER_TEMP/airwar-wheels"
          python -m pip install "$RUNNER_TEMP"/airwar-wheels/*.whl

      - name: Run Ruff
        run: python -m ruff check .

      - name: Check Python bytecode compilation
        run: python -m compileall -q airwar main.py

      - name: Check build scripts with shellcheck
        run: |
          shellcheck --severity=warning build_linux.sh build_macos.sh

      - name: Run tests
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python -m pytest
