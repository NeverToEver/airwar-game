name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: airwar_core

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Build Rust extension
        run: python -m maturin develop --release --manifest-path airwar_core/Cargo.toml

      - name: Run Ruff
        run: python -m ruff check .

      - name: Check Python bytecode compilation
        run: python -m compileall -q airwar main.py

      - name: Check build script syntax
        run: |
          bash -n build_linux.sh
          bash -n build_macos.sh

      - name: Run tests
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python -m pytest
