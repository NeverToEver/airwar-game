[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke: Smoke tests - core functionality verification
    slow: Tests that take longer to run (e.g., integration tests, performance tests)

addopts =
    -v
    --tb=short
    -ra

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

console_output_style = progress
